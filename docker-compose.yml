version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - '4000:4000'
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend:/usr/src/app
  web:
    working_dir: /usr/src/app
    build:
      context: ./web
    ports:
      - '3000:3000'
    command: npm run dev
  management:
    working_dir: /usr/src/app
    build:
      context: ./management
    ports:
      - '3001:3001'
    command: npm run dev
  student:
    working_dir: /usr/src/app
    build:
      context: ./student
    ports:
      - '3002:3002'
    command: npm run dev
  staff:
    working_dir: /usr/src/app
    build:
      context: ./staff
    ports:
      - '3003:3003'
    command: npm run dev
  parents:
    working_dir: /usr/src/app
    build:
      context: ./parents
    ports:
      - '3004:3004'
    command: npm run dev
  admin:
    working_dir: /usr/src/app
    build:
      context: ./admin
    ports:
      - '3005:3005'
    command: npm run dev
